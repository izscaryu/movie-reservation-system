spring:
  application:
    name: movie-reservation-system

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:movie_reservation}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:movieuser}
    password: ${DB_PASSWORD:moviepass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate must never alter it — only validate
      # that entities match the migrated tables (starting Phase 1).
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

# Seed admin user created on startup by AdminUserInitializer (idempotent).
app:
  admin:
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:admin123}
    name: ${ADMIN_NAME:Administrator}
  jwt:
    # HS256 signing key. Dev-only default below — MUST be overridden via
    # JWT_SECRET in any real environment. Must be >= 32 bytes for HS256.
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789-abcdefghijklmnop}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
