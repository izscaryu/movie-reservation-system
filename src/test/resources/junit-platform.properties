# Integration tests share ONE Testcontainers MySQL and wipe all transactional
# tables in a @BeforeEach (see AbstractIntegrationTest). That isolation model is
# only safe under sequential execution -- with parallelism, two classes would
# truncate each other's rows mid-test. Keep parallel execution OFF unless the
# isolation strategy changes to per-class schemas / databases.
junit.jupiter.execution.parallel.enabled=false
